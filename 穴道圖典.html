<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>穴道圖典 · 經絡查詢</title>
<style>
  :root{
    --paper:#F5EFE3;
    --paper-deep:#ECE3D2;
    --ink:#2B2620;
    --ink-soft:#6B5F50;
    --cinnabar:#B5402E;
    --jade:#5C7A5C;
    --bamboo:#C9A876;
    --line:#D8CBB4;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--paper);
    color:var(--ink);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(201,168,118,0.10) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(92,122,92,0.08) 0%, transparent 45%);
  }
  .site-title{ font-family:"Noto Serif TC",serif; font-weight:900; }
  header{
    padding:28px 32px 18px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:baseline;
    gap:16px;
    flex-wrap:wrap;
  }
  header h1{ font-size:30px; margin:0; letter-spacing:.08em; }
  header h1 span{ color:var(--cinnabar); }
  header p{ margin:0; color:var(--ink-soft); font-size:13px; letter-spacing:.05em; }
  .tabs{ display:flex; gap:8px; margin-left:auto; }
  .tab-btn{
    padding:8px 18px;
    border:1px solid var(--ink);
    border-radius:18px;
    background:transparent;
    font-family:"Noto Serif TC",serif;
    font-size:13px;
    letter-spacing:.1em;
    cursor:pointer;
    color:var(--ink);
  }
  .tab-btn.active{ background:var(--ink); color:var(--paper); }

  .layout{
    display:grid;
    grid-template-columns:220px 1fr 340px;
    gap:0;
    min-height:calc(100vh - 90px);
  }
  @media (max-width:1100px){
    .layout{grid-template-columns:1fr;}
    .sidebar, .detail{order:2;}
    .stage{order:1;}
  }
  .sidebar{ padding:24px 18px; border-right:1px solid var(--line); }
  .sidebar h2, .detail h2{
    font-family:"Noto Serif TC",serif;
    font-size:14px;
    letter-spacing:.2em;
    color:var(--ink-soft);
    margin:0 0 12px;
    text-transform:uppercase;
  }
  .meridian-btn{
    display:block;
    width:100%;
    text-align:left;
    padding:9px 12px;
    margin-bottom:6px;
    border:1px solid transparent;
    border-radius:3px;
    background:transparent;
    font-size:13.5px;
    color:var(--ink);
    cursor:pointer;
    font-family:inherit;
    transition:.15s;
  }
  .meridian-btn:hover{ background:var(--paper-deep); }
  .meridian-btn.active{
    background:var(--paper-deep);
    border-color:var(--bamboo);
    color:var(--cinnabar);
    font-weight:700;
  }
  .meridian-btn .dot{
    display:inline-block;
    width:8px;height:8px;border-radius:50%;
    margin-right:8px;
  }
  .stage{ display:flex; flex-direction:column; align-items:center; padding:18px 12px; position:relative; }
  .stage-toolbar{
    width:100%;
    max-width:480px;
    display:flex;
    gap:10px;
    margin-bottom:6px;
  }
  .stage-toolbar input{
    flex:1;
    padding:10px 14px;
    border:1px solid var(--line);
    border-radius:20px;
    background:#fff;
    font-size:14px;
    font-family:inherit;
    outline:none;
  }
  .stage-toolbar input:focus{ border-color:var(--cinnabar); }
  .view-toggle{
    display:flex;
    border:1px solid var(--line);
    border-radius:20px;
    overflow:hidden;
    flex-shrink:0;
  }
  .view-toggle button{
    padding:10px 16px;
    border:none;
    background:#fff;
    font-family:inherit;
    font-size:13px;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .view-toggle button.active{ background:var(--ink); color:var(--paper); }
  svg.body-chart{ width:100%; max-width:420px; touch-action:manipulation; }
  .point{ cursor:pointer; }
  .point circle.halo{
    fill:none;
    stroke:var(--cinnabar);
    stroke-width:1.5;
    opacity:0;
    transition:opacity .15s, r .15s;
  }
  .point circle.core{ fill:var(--cinnabar); transition:r .15s, fill .15s; }
  .point:hover circle.halo, .point.selected circle.halo{ opacity:1; r:11; }
  .point.selected circle.core{ fill:var(--jade); }
  .point text{
    font-size:9px;
    fill:var(--ink-soft);
    font-family:"Noto Serif TC",serif;
    pointer-events:none;
  }
  .stage-hint{ margin-top:10px; font-size:12px; color:var(--ink-soft); text-align:center; max-width:420px; }
  .detail{ padding:24px 22px; border-left:1px solid var(--line); }
  .empty-state{ color:var(--ink-soft); font-size:13.5px; line-height:1.9; padding-top:6px; }
  .empty-state .seal{
    display:inline-block;
    border:2px solid var(--cinnabar);
    color:var(--cinnabar);
    font-family:"Noto Serif TC",serif;
    font-weight:900;
    padding:4px 8px;
    border-radius:3px;
    transform:rotate(-4deg);
    margin-bottom:14px;
  }
  .point-card{ animation:fade .25s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  .point-card .name-cn{ font-family:"Noto Serif TC",serif; font-size:28px; font-weight:900; margin:0; line-height:1.2; }
  .point-card .name-py{ color:var(--ink-soft); font-size:13px; margin:4px 0 2px; }
  .point-card .code{
    display:inline-block;
    margin-top:6px;
    font-family:"Noto Serif TC",serif;
    font-size:12px;
    border:1px solid var(--ink);
    border-radius:3px;
    padding:2px 8px;
    letter-spacing:.1em;
  }
  .point-card .meridian-tag{
    display:inline-block;
    margin-top:6px;
    margin-left:6px;
    font-size:12px;
    color:#fff;
    border-radius:3px;
    padding:2px 8px;
  }
  .point-card section{ margin-top:16px; }
  .point-card section h3{
    font-family:"Noto Serif TC",serif;
    font-size:13px;
    letter-spacing:.15em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin:0 0 6px;
    border-bottom:1px solid var(--line);
    padding-bottom:4px;
  }
  .point-card section p{ margin:0; font-size:13.5px; line-height:1.9; }
  .note-box{ margin-top:18px; }
  .note-box h3{
    font-family:"Noto Serif TC",serif;
    font-size:13px;
    letter-spacing:.15em;
    color:var(--ink-soft);
    text-transform:uppercase;
    border-bottom:1px solid var(--line);
    padding-bottom:4px;
    margin:0 0 6px;
  }
  .note-box textarea{
    width:100%;
    min-height:70px;
    border:1px solid var(--line);
    border-radius:6px;
    padding:8px 10px;
    font-family:inherit;
    font-size:13px;
    resize:vertical;
    background:#fff;
    outline:none;
  }
  .note-box textarea:focus{ border-color:var(--bamboo); }
  .note-status{ font-size:11px; color:var(--ink-soft); margin-top:4px; height:14px; }

  .symptom-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
    gap:10px;
    width:100%;
    max-width:560px;
  }
  .symptom-card{
    border:1px solid var(--line);
    background:#fff;
    border-radius:8px;
    padding:12px 14px;
    cursor:pointer;
    transition:.15s;
    text-align:left;
  }
  .symptom-card:hover, .symptom-card.selected{
    border-color:var(--cinnabar);
    transform:translateY(-2px);
    box-shadow:0 4px 10px rgba(0,0,0,0.06);
  }
  .symptom-card .cat-tag{
    display:inline-block;
    font-size:10px;
    color:#fff;
    border-radius:3px;
    padding:1px 6px;
    margin-bottom:6px;
  }
  .symptom-card h4{ font-family:"Noto Serif TC",serif; margin:0 0 4px; font-size:16px; }
  .symptom-card p{ margin:0; font-size:12px; color:var(--ink-soft); line-height:1.6; }

  .formula-card .name-cn{ font-size:24px; }
  .formula-item{
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    margin-bottom:10px;
    background:#fff;
  }
  .formula-item h4{ font-family:"Noto Serif TC",serif; margin:0 0 6px; font-size:17px; }
  .pattern-tag{
    display:inline-block;
    font-size:11.5px;
    color:var(--ink-soft);
    background:var(--paper-deep);
    border-radius:3px;
    padding:2px 8px;
    margin-bottom:8px;
    line-height:1.6;
  }
  .formula-item .f-row{ font-size:13px; line-height:1.85; margin-top:4px; }
  .formula-item .f-row b{
    font-family:"Noto Serif TC",serif;
    color:var(--ink-soft);
    font-weight:700;
    margin-right:4px;
  }
  .related-points{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .related-points button{
    border:1px solid var(--bamboo);
    background:transparent;
    border-radius:14px;
    padding:4px 10px;
    font-size:12px;
    font-family:inherit;
    cursor:pointer;
    color:var(--ink);
  }
  .related-points button:hover{ background:var(--bamboo); color:#fff; }
  .disclaimer{
    font-size:11.5px;
    color:var(--ink-soft);
    background:var(--paper-deep);
    border-left:3px solid var(--cinnabar);
    padding:8px 12px;
    margin-top:14px;
    line-height:1.7;
    border-radius:0 4px 4px 0;
  }
  .fav-empty{ font-size:12.5px; color:var(--ink-soft); }
</style>
</head>

// ---------- storage (personal notes) ----------
async function loadNote(pointId){
  try{
    const res = await window.storage.get('note:'+pointId);
    return res && res.value ? res.value : '';
  }catch(e){ return ''; }
}
async function saveNote(pointId, text){
  const statusEl = document.getElementById('noteStatus');
  try{
    await window.storage.set('note:'+pointId, text);
    if(statusEl) statusEl.textContent = '已儲存';
    setTimeout(()=>{ if(statusEl) statusEl.textContent=''; }, 1200);
  }catch(e){
    if(statusEl) statusEl.textContent = '儲存失敗';
  }
}

// ---------- sidebar ----------
function buildSidebar(){
  const title = document.getElementById('sidebarTitle');
  const wrap = document.getElementById('sidebarList');
  wrap.innerHTML = '';
  if(activeView === "body"){
    title.textContent = "經絡 Meridians";
    const meridians = ["ALL", ...Object.keys(MERIDIAN_COLORS)];
    meridians.forEach(m=>{
      const btn = document.createElement('button');
      btn.className = 'meridian-btn' + (activeMeridian===m ? ' active':'');
      const color = m==="ALL" ? "#2B2620" : MERIDIAN_COLORS[m];
      btn.innerHTML = `<span class="dot" style="background:${color}"></span>${m==="ALL" ? "全部穴位" : m}`;
      btn.onclick = ()=>{ activeMeridian = m; buildSidebar(); render(); };
      wrap.appendChild(btn);
    });
  }else{
    title.textContent = "病徵分類 Categories";
    const cats = ["ALL", ...Object.keys(SYMPTOM_CATEGORIES)];
    cats.forEach(c=>{
      const btn = document.createElement('button');
      btn.className = 'meridian-btn' + (activeCategory===c ? ' active':'');
      const color = c==="ALL" ? "#2B2620" : SYMPTOM_CATEGORIES[c];
      btn.innerHTML = `<span class="dot" style="background:${color}"></span>${c==="ALL" ? "全部病徵" : c}`;
      btn.onclick = ()=>{ activeCategory = c; buildSidebar(); render(); };
      wrap.appendChild(btn);
    });
  }
}

// ---------- filters ----------
function matchesFilter(p){
  if(p.view !== activeBodyView) return false;
  const meridianOk = activeMeridian==="ALL" || p.meridian===activeMeridian;
  const term = searchTerm.trim();
  const searchOk = !term || [p.name,p.py,p.id,p.indications,p.location,p.meridian]
    .some(f=>f.toLowerCase().includes(term.toLowerCase()));
  return meridianOk && searchOk;
}

function matchesSymptomFilter(s){
  const catOk = activeCategory==="ALL" || s.category===activeCategory;
  const term = searchTerm.trim().toLowerCase();
  const searchOk = !term || [s.name, s.description, s.category, ...s.formulas.flatMap(f=>[f.name,f.composition,f.pattern])]
    .some(f=>f.toLowerCase().includes(term));
  return catOk && searchOk;
}

// ---------- points on body ----------
function buildPoints(){
  const layer = document.getElementById('pointsLayer');
  layer.innerHTML = '';
  POINTS.filter(p=>p.view===activeBodyView).forEach(p=>{
    const visible = matchesFilter(p);
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class', 'point' + (p.id===selectedId ? ' selected':''));
    g.style.opacity = visible ? '1' : '0.15';
    g.style.pointerEvents = visible ? 'auto' : 'none';
    g.innerHTML = `
      <circle class="halo" cx="${p.x}" cy="${p.y}" r="9"/>
      <circle class="core" cx="${p.x}" cy="${p.y}" r="6"/>
      <text x="${p.x + (p.x<200?-12:12)}" y="${p.y+4}" text-anchor="${p.x<200?'end':'start'}">${p.name}</text>
    `;
    g.onclick = ()=>{ selectedId = p.id; render(); };
    layer.appendChild(g);
  });
}

// ---------- symptom cards ----------
function buildSymptomCards(){
  const wrap = document.getElementById('symptomStage');
  wrap.innerHTML = '';
  const list = SYMPTOM_GROUPS.filter(matchesSymptomFilter);
  if(list.length===0){
    wrap.innerHTML = '<p class="fav-empty">沒有符合的病徵，請調整搜尋或分類。</p>';
    return;
  }
  list.forEach(s=>{
    const card = document.createElement('button');
    card.className = 'symptom-card' + (s.id===selectedSymptomId ? ' selected':'');
    const color = SYMPTOM_CATEGORIES[s.category];
    card.innerHTML = `
      <span class="cat-tag" style="background:${color}">${s.category}</span>
      <h4>${s.name}</h4>
      <p>${s.description}</p>
      <p style="margin-top:6px;color:var(--cinnabar);font-size:11.5px;">${s.formulas.map(f=>f.name).join(' ／ ')}</p>
    `;
    card.onclick = ()=>{ selectedSymptomId = s.id; render(); };
    wrap.appendChild(card);
  });
}

// ---------- stage / view toggles ----------
function updateStageVisibility(){
  document.getElementById('bodyStage').style.display = activeView==="body" ? '' : 'none';
  document.getElementById('symptomStage').style.display = activeView==="symptom" ? 'grid' : 'none';
  document.getElementById('bodyViewToggle').style.display = activeView==="body" ? '' : 'none';
  document.getElementById('search').placeholder = activeView==="body"
    ? "搜尋穴位名稱、代號或主治⋯ 例如：合谷"
    : "搜尋病徵或方劑名稱⋯ 例如：失眠 / 葛根湯";
}

function setBodySide(side){
  activeBodyView = side;
  document.getElementById('figureFront').style.display = side==="front" ? '' : 'none';
  document.getElementById('figureBack').style.display = side==="back" ? '' : 'none';
  document.querySelectorAll('#bodyViewToggle button').forEach(b=>{
    b.classList.toggle('active', b.dataset.side===side);
  });
  if(selectedId){
    const p = POINTS.find(x=>x.id===selectedId);
    if(!p || p.view!==activeBodyView) selectedId = null;
  }
  render();
}

// ---------- jump from symptom to a point on body chart ----------
function jumpToPoint(pointId){
  const p = POINTS.find(x=>x.id===pointId);
  if(!p) return;
  activeView = "body";
  activeMeridian = "ALL";
  selectedId = pointId;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.view==="body"));
  buildSidebar();
  updateStageVisibility();
  setBodySide(p.view);
}

// ---------- detail panel ----------
async function renderDetail(){
  if(activeView === "symptom"){
    renderSymptomDetail();
    return;
  }
  const panel = document.getElementById('detailPanel');
  const p = POINTS.find(pt=>pt.id===selectedId);

  if(!p){
    panel.innerHTML = `
      <h2>穴位資料</h2>
      <div class="empty-state">
        <span class="seal">未選取</span><br>
        請於人形圖上點選一個穴位，即可顯示名稱、定位、主治與個人筆記。
      </div>
    `;
    return;
  }

  const color = MERIDIAN_COLORS[p.meridian] || '#8A8273';
  panel.innerHTML = `
    <h2>穴位資料</h2>
    <div class="point-card">
      <p class="name-cn">${p.name}</p>
      <p class="name-py">${p.py}</p>
      <span class="code">${p.id}</span>
      <span class="meridian-tag" style="background:${color}">${p.meridian}</span>
      <section>
        <h3>定位 Location</h3>
        <p>${p.location}</p>
      </section>
      <section>
        <h3>功效 Action</h3>
        <p>${p.action}</p>
      </section>
      <section>
        <h3>主治 Indications</h3>
        <p>${p.indications}</p>
      </section>
      <div class="note-box">
        <h3>我的筆記</h3>
        <textarea id="noteArea" placeholder="記錄個人按壓心得、症狀反應或提醒事項⋯"></textarea>
        <div class="note-status" id="noteStatus"></div>
      </div>
    </div>
  `;
  const noteArea = document.getElementById('noteArea');
  noteArea.value = await loadNote(p.id);
  let debounce;
  noteArea.oninput = ()=>{
    clearTimeout(debounce);
    const statusEl = document.getElementById('noteStatus');
    if(statusEl) statusEl.textContent = '儲存中⋯';
    debounce = setTimeout(()=>saveNote(p.id, noteArea.value), 500);
  };
}

// ---------- symptom/formula detail ----------
function renderSymptomDetail(){
  const panel = document.getElementById('detailPanel');
  const s = SYMPTOM_GROUPS.find(x=>x.id===selectedSymptomId);
  if(!s){
    panel.innerHTML = `
      <h2>病徵與方劑</h2>
      <div class="empty-state">
        <span class="seal">未選取</span><br>
        請於左側選擇病徵分類，並點選中間的病徵卡片，即可看到依證型分類的多個方劑選項。
      </div>
      <div class="disclaimer">
        本資料僅供中醫藥知識教育參考，不能取代醫師診斷與處方。實際用藥請務必諮詢合格中醫師，依個人體質辨證調整。
      </div>
    `;
    return;
  }
  const color = SYMPTOM_CATEGORIES[s.category];
  const formulasHtml = s.formulas.map(f=>`
    <div class="formula-item">
      <h4>${f.name}</h4>
      <span class="pattern-tag">辨證：${f.pattern}</span>
      <div class="f-row"><b>組成</b>${f.composition}</div>
      <div class="f-row"><b>用法</b>${f.usage}</div>
      <div class="f-row"><b>注意</b>${f.notes}</div>
    </div>
  `).join('');
  const pointsHtml = s.points.map(pid=>{
    const p = POINTS.find(x=>x.id===pid);
    return p ? `<button data-pid="${pid}">${p.name} ${p.id}</button>` : '';
  }).join('');
  panel.innerHTML = `
    <h2>病徵與方劑</h2>
    <div class="point-card formula-card">
      <p class="name-cn">${s.name}</p>
      <span class="meridian-tag" style="background:${color}">${s.category}</span>
      <section>
        <h3>概述</h3>
        <p>${s.description}</p>
      </section>
      <section>
        <h3>依證型選方</h3>
        ${formulasHtml}
      </section>
      <section>
        <h3>建議配合穴位</h3>
        <div class="related-points">${pointsHtml}</div>
      </section>
      <div class="disclaimer">
        本資料僅供中醫藥知識教育參考，不能取代醫師診斷與處方。實際用藥請務必諮詢合格中醫師，依個人體質辨證調整。
      </div>
    </div>
  `;
  panel.querySelectorAll('.related-points button').forEach(btn=>{
    btn.onclick = ()=>jumpToPoint(btn.dataset.pid);
  });
}

function render(){
  if(activeView === "body"){
    buildPoints();
  }else{
    buildSymptomCards();
  }
  renderDetail();
}

document.getElementById('search').addEventListener('input', e=>{
  searchTerm = e.target.value;
  render();
});

document.querySelectorAll('#bodyViewToggle button').forEach(btn=>{
  btn.onclick = ()=>setBodySide(btn.dataset.side);
});

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick = ()=>{
    activeView = btn.dataset.view;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b===btn));
    searchTerm = '';
    document.getElementById('search').value = '';
    selectedSymptomId = null;
    selectedId = null;
    buildSidebar();
    updateStageVisibility();
    render();
  };
});

buildSidebar();
updateStageVisibility();
render();
</script>

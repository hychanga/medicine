spring:
  application:
    name: medicine-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  auth:
    # Shared HS256 secret used to verify JWTs minted by the Next.js BFF.
    # Override in production via AUTH_SHARED_SECRET (must match the frontend).
    shared-secret: ${AUTH_SHARED_SECRET:dev-local-shared-secret-please-change-0123456789}
  admin:
    # Comma-separated emails allowed to write global acupoint calibrations.
    # Override in production via APP_ADMIN_EMAILS.
    emails: ${APP_ADMIN_EMAILS:hychanga@gmail.com}
  gemini:
    # Google Gemini API key for auto-tagging 養生 resources. When blank, tag
    # generation is skipped and tags fall back to whatever is entered manually.
    # Override in production via GEMINI_API_KEY (store in Secret Manager).
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
  gcs:
    # Public bucket holding 養生 PDFs. Admin uploads go straight to GCS via a
    # short-lived signed URL minted by the backend.
    bucket: ${GCS_BUCKET:medicine-wellness-880984423210}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
